<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodApp | Gourmet Excellence Delivered</title>
    <meta name="description" content="Experience the finest gourmet dishes curated by top chefs, delivered fresh to your doorstep.">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        primary: '#f97316', // orange-500
                    }
                }
            }
        }
    </script>
    
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .hero-gradient {
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.4) 50%, rgba(10,10,10,1) 100%);
        }
    </style>
</head>
<body class="font-sans antialiased bg-[#0a0a0a] text-white">

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 py-6 px-4 md:px-8 transition-all duration-300" aria-label="Main Navigation">
        <div class="max-w-7xl mx-auto flex items-center justify-between glass px-6 py-4 rounded-3xl border border-white/10 shadow-2xl">
            <a href="#" class="flex items-center gap-3 group" aria-label="FoodApp Home">
                <div class="bg-primary p-2 rounded-xl shadow-lg shadow-primary/30 group-hover:scale-105 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                </div>
                <span class="font-heading font-bold text-2xl tracking-tight">FoodApp</span>
            </a>
            
            <div class="hidden md:flex items-center gap-8">
                <a href="#menu" class="text-sm font-medium text-white/70 hover:text-white transition-colors">Our Menu</a>
                <a href="#offers" class="text-sm font-medium text-white/70 hover:text-white transition-colors">Offers</a>
                <a href="#experience" class="text-sm font-medium text-white/70 hover:text-white transition-colors">Experience</a>
                <a href="#order" class="bg-white text-black px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-white/90 transition-all shadow-lg">Order Now</a>
            </div>
            
            <button class="md:hidden p-2" aria-label="Toggle Menu">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
                </svg>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="relative min-h-screen flex items-center justify-center overflow-hidden" aria-label="Hero Section">
        <!-- Background Image -->
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 hero-gradient z-10"></div>
            <img 
                src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=2070&auto=format&fit=crop" 
                alt="High-quality food presentation on a table" 
                class="w-full h-full object-cover scale-105 animate-[pulse_10s_infinite_ease-in-out]"
                role="presentation"
            >
        </div>

        <!-- Semantic Overlay Content -->
        <div class="container relative z-20 px-4 md:px-6 mx-auto flex flex-col items-center text-center">
            <!-- Badge -->
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass border border-white/20 text-white mb-8 animate-[fadeInUp_0.8s_ease-out]">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-orange-400"></span>
                </span>
                <span class="text-xs font-semibold tracking-widest uppercase">FoodApp v1.0 — Experience Gourmet</span>
            </div>

            <!-- Headline -->
            <h1 class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl font-heading font-extrabold text-white tracking-tighter mb-8 max-w-5xl leading-[0.9] animate-[fadeInUp_1s_ease-out_0.2s_both]">
                Gourmet <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 via-amber-300 to-yellow-400">Excellence</span> Delivered
            </h1>

            <!-- Sub-headline -->
            <p class="text-lg sm:text-xl md:text-2xl text-white/80 max-w-2xl mb-12 leading-relaxed font-light drop-shadow-lg animate-[fadeInUp_1s_ease-out_0.4s_both]">
                Discover a world of flavors with our chef-curated premium dining experience, 
                bringing restaurant-quality meals straight to your table.
            </p>

            <!-- CTA Buttons -->
            <div class="flex flex-col sm:flex-row items-center gap-5 w-full sm:w-auto animate-[fadeInUp_1s_ease-out_0.6s_both]">
                <a href="#order" class="group relative inline-flex items-center justify-center gap-2 bg-primary hover:bg-orange-600 text-white px-10 py-5 rounded-2xl font-bold text-lg transition-all duration-300 shadow-2xl shadow-primary/40 overflow-hidden" aria-label="Order food now">
                    <span class="relative z-10">Order Now</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </a>
                <a href="#menu" class="inline-flex items-center justify-center gap-2 px-10 py-5 rounded-2xl font-bold text-lg border-2 border-white/20 text-white hover:bg-white/10 transition-all duration-300 backdrop-blur-xl" aria-label="View our menu">
                    Explore Menu
                </a>
            </div>
        </div>

        <!-- Scroll Indicator -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 animate-bounce opacity-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
        </div>
    </header>

    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0px);
            }
        }
    </style>
</body>
</html>
